name: Build + push to deploy branch

# Builds the Next.js static site on every push to main and pushes the
# contents of out/ to the deploy branch as a normal commit (parent =
# previous deploy commit). Hostinger's webhook watches the deploy
# branch and pulls.
#
# Note: we do NOT use force_orphan. Earlier we did, which made every
# deploy commit a parentless orphan. That broke Hostinger's auto-pull
# because there was never a fast-forward path between the previous and
# new commit; the server's working tree got stuck on stale files until
# we manually wiped it. With normal-history pushes, `git pull` on the
# Hostinger side fast-forwards cleanly.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /thecivil
          NEXT_PUBLIC_SITE_URL: https://demo.gabrielgabrie.com/thecivil
          # Owner login: when ADMIN_PAT_ENC secret is set, the admin page
          # shows a plain username/password form. The secret value is an
          # AES-GCM-encrypted GitHub PAT (produced by scripts/encrypt-admin-pat.mjs);
          # the password unlocks it client-side. We use the encrypted form
          # specifically so GitHub's secret scanning doesn't see a raw PAT
          # in the deployed JS bundle and auto-revoke it. See ADMIN.md.
          NEXT_PUBLIC_ADMIN_PAT_ENC: ${{ secrets.ADMIN_PAT_ENC }}

      - name: Push out/ to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: deploy
          # force_orphan intentionally omitted. See top-of-file note.
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
