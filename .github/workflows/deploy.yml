name: Build + push to deploy branch

# Builds the Next.js static site on every push to main and force-pushes
# the contents of out/ to the deploy branch as a single orphan commit.
# Hostinger's webhook should watch the deploy branch (not main) so it
# only ever clones the lightweight built output, never source code.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /thecivil
          NEXT_PUBLIC_SITE_URL: https://demo.gabrielgabrie.com/thecivil

      - name: Push out/ to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: deploy
          force_orphan: true
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
